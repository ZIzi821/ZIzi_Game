<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>International Community - ZIzi Game</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; --panel: rgba(255,255,255,.075); --line: rgba(255,255,255,.16); --text: #f3f7fb; --muted: #a5b0bd; --cyan: #42f5d4; --gold: #ffc857; --red: #ff6574; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; background: radial-gradient(circle at 18% 12%, rgba(66,245,212,.18), transparent 30%), radial-gradient(circle at 82% 74%, rgba(255,200,87,.14), transparent 32%), linear-gradient(135deg,#07090c,#101621 58%,#08090d); color: var(--text); }
      button, input, textarea { font: inherit; }
      main { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: clamp(28px, 6vw, 72px) 0; }
      nav, .form-row, .pending-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
      nav { margin-bottom: 30px; }
      .back, .submit, .tool { min-height: 40px; padding: 9px 13px; border: 1px solid rgba(66,245,212,.34); border-radius: 8px; background: rgba(66,245,212,.09); color: var(--cyan); text-decoration: none; font-weight: 800; cursor: pointer; }
      .eyebrow { margin: 0 0 12px; color: var(--cyan); font-size: 12px; font-weight: 900; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(42px, 8vw, 76px); line-height: .96; letter-spacing: 0; }
      .intro { max-width: 72ch; margin: 18px 0 28px; color: var(--muted); line-height: 1.75; font-size: 17px; }
      .panel, .message { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); box-shadow: 0 22px 58px rgba(0,0,0,.24); }
      .panel { padding: 20px; margin-bottom: 18px; }
      form { display: grid; gap: 12px; }
      label { display: grid; gap: 7px; color: var(--muted); font-size: 13px; font-weight: 800; }
      input, textarea { width: 100%; border: 1px solid rgba(66,245,212,.24); border-radius: 8px; background: rgba(5,10,17,.86); color: var(--text); outline: none; }
      input { min-height: 44px; padding: 10px 12px; }
      textarea { min-height: 132px; resize: vertical; padding: 12px; line-height: 1.6; }
      .submit { border-color: rgba(255,200,87,.72); background: linear-gradient(180deg, rgba(255,200,87,.28), rgba(66,245,212,.13)); color: var(--text); }
      .hint { color: var(--muted); font-size: 13px; }
      .error { color: var(--red); }
      .messages { display: grid; gap: 12px; }
      .message { padding: 16px; }
      .message header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
      .name { color: var(--gold); font-weight: 900; }
      .time { color: var(--muted); font-size: 13px; }
      .body { margin: 0; white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.68; }
      .pending textarea { min-height: 118px; margin: 12px 0; font-size: 12px; }
      .pending[hidden] { display: none; }
    </style>
  </head>
  <body>
    <main>
      <nav><a class="back" href="forum.html">Back to Region Selection</a></nav>
      <p class="eyebrow">International Community</p>
      <h1>国际评论区 / International Comments</h1>
      <p class="intro">International users continue to use Firebase. If Firebase is unavailable, this page reads the exported JSON cache and can generate a GitHub sync submission.</p>

      <section class="panel" aria-label="Post a comment">
        <form id="messageForm">
          <label>Name / 昵称 <input id="nickname" name="nickname" maxlength="20" autocomplete="name" placeholder="20 characters max" required /></label>
          <label>Message / 留言 <textarea id="message" name="message" maxlength="300" placeholder="300 characters max" required></textarea></label>
          <div class="form-row">
            <button class="submit" id="submitButton" type="submit">Post comment</button>
            <span class="hint" id="statusText">Connecting to Firebase...</span>
          </div>
        </form>
      </section>

      <section class="panel pending" id="pendingPanel" hidden>
        <strong>Pending local sync</strong>
        <textarea id="syncCodeText" readonly></textarea>
        <div class="pending-actions">
          <button class="tool" id="githubButton" type="button">Submit to GitHub Sync Inbox</button>
          <button class="tool" id="copyButton" type="button">Copy GitHub Issue link</button>
          <button class="tool" id="deleteButton" type="button">Delete local pending content</button>
        </div>
      </section>

      <section class="messages" id="messages" aria-live="polite" aria-label="Comment list"></section>
    </main>

    <script type="module">
      import { firebaseConfig } from "./assets/firebase-config.js";
      import {
        addPendingSyncItem,
        cleanMessage,
        cleanText,
        createIssueUrlFromItems,
        createSyncCode,
        getPendingSyncItems,
        makeSyncId,
        openIssueForItems,
        removePendingSyncItem
      } from "./assets/sync-code.js";
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import { addDoc, collection, getDocs, getFirestore, limit, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

      const FIREBASE_TIMEOUT_MS = 3500;
      const form = document.getElementById("messageForm");
      const nicknameInput = document.getElementById("nickname");
      const messageInput = document.getElementById("message");
      const submitButton = document.getElementById("submitButton");
      const statusText = document.getElementById("statusText");
      const messagesEl = document.getElementById("messages");
      const pendingPanel = document.getElementById("pendingPanel");
      const syncCodeText = document.getElementById("syncCodeText");
      const githubButton = document.getElementById("githubButton");
      const copyButton = document.getElementById("copyButton");
      const deleteButton = document.getElementById("deleteButton");
      let messagesRef = null;
      let firebaseAvailable = false;
      let activePendingItem = null;

      function withTimeout(promise, ms, label) {
        return Promise.race([promise, new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} timed out`)), ms))]);
      }
      function setStatus(text, error = false) {
        statusText.textContent = text;
        statusText.classList.toggle("error", error);
      }
      function formatTime(value) {
        const date = value?.toDate ? value.toDate() : new Date(value || Date.now());
        return Number.isNaN(date.getTime()) ? "Just now" : date.toLocaleString("zh-CN");
      }
      function renderMessage(data) {
        const article = document.createElement("article");
        article.className = "message";
        const header = document.createElement("header");
        const name = document.createElement("span");
        name.className = "name";
        name.textContent = data.nickname || "Anonymous";
        const time = document.createElement("time");
        time.className = "time";
        time.textContent = formatTime(data.createdAt);
        const body = document.createElement("p");
        body.className = "body";
        body.textContent = data.message || "";
        header.append(name, time);
        article.append(header, body);
        return article;
      }
      function renderMessages(comments) {
        messagesEl.replaceChildren();
        if (!comments.length) {
          const empty = document.createElement("p");
          empty.className = "hint";
          empty.textContent = "No comments yet.";
          messagesEl.append(empty);
          return;
        }
        comments.forEach((comment) => messagesEl.append(renderMessage(comment)));
      }
      function showPending(item) {
        activePendingItem = item;
        syncCodeText.value = createSyncCode([item]);
        pendingPanel.hidden = false;
      }
      function loadPending() {
        const items = getPendingSyncItems().filter((item) => item.type === "comment");
        if (items[0]) showPending(items[items.length - 1]);
      }
      async function loadCachedComments(reason = "") {
        const response = await fetch("./data/comments.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        renderMessages(Array.isArray(data.comments) ? data.comments : []);
        setStatus(`${reason}Cache mode: showing the latest exported data.`);
      }
      async function loadFirebaseComments() {
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        messagesRef = collection(db, "messages");
        const messagesQuery = query(messagesRef, orderBy("createdAt", "desc"), limit(50));
        const snapshot = await withTimeout(getDocs(messagesQuery), FIREBASE_TIMEOUT_MS, "Firebase comments");
        firebaseAvailable = true;
        renderMessages(snapshot.docs.map((doc) => doc.data()));
        setStatus("Firebase comments loaded.");
      }
      async function loadComments() {
        try {
          await loadFirebaseComments();
        } catch (error) {
          console.warn("[ZIzi Forum] Firebase read fell back to cache:", error);
          firebaseAvailable = false;
          try {
            await loadCachedComments("Firebase unavailable. ");
          } catch (cacheError) {
            console.warn("[ZIzi Forum] Cache read failed:", cacheError);
            setStatus("Comments are unavailable.", true);
          }
        }
      }
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const nickname = cleanText(nicknameInput.value, 20);
        const message = cleanMessage(messageInput.value, 300);
        if (!nickname || !message) {
          setStatus("Please enter a nickname and message.", true);
          return;
        }
        submitButton.disabled = true;
        setStatus("Submitting...");
        const pendingItem = {
          id: makeSyncId(),
          type: "comment",
          nickname,
          message,
          createdAt: new Date().toISOString(),
          sourceRegion: "international"
        };
        try {
          if (!firebaseAvailable || !messagesRef) await loadFirebaseComments();
          await withTimeout(addDoc(messagesRef, { nickname, message, createdAt: serverTimestamp() }), FIREBASE_TIMEOUT_MS, "Firebase submit");
          messageInput.value = "";
          setStatus("Comment posted to Firebase.");
          await loadComments();
        } catch (error) {
          console.warn("[ZIzi Forum] Comment queued for GitHub sync:", error);
          const saved = addPendingSyncItem(pendingItem);
          showPending(saved);
          setStatus("Firebase is unavailable. Comment saved locally for GitHub sync.", true);
        } finally {
          submitButton.disabled = false;
        }
      });
      githubButton.addEventListener("click", () => {
        if (activePendingItem) openIssueForItems([activePendingItem]);
      });
      copyButton.addEventListener("click", async () => {
        if (!activePendingItem) return;
        await navigator.clipboard?.writeText(createIssueUrlFromItems([activePendingItem]));
        setStatus("GitHub Issue link copied.");
      });
      deleteButton.addEventListener("click", () => {
        if (activePendingItem) removePendingSyncItem(activePendingItem.id);
        activePendingItem = null;
        pendingPanel.hidden = true;
        setStatus("Local pending content deleted.");
      });
      loadComments();
      loadPending();
    </script>
  </body>
</html>

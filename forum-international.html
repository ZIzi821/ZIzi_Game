<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>国际留言板 / International Community - ZIzi Game</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #07090c;
        --panel: rgba(255, 255, 255, 0.075);
        --line: rgba(255, 255, 255, 0.16);
        --text: #f3f7fb;
        --muted: #a5b0bd;
        --cyan: #42f5d4;
        --gold: #ffc857;
        --red: #ff6574;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 18% 12%, rgba(66, 245, 212, 0.18), transparent 30%),
          radial-gradient(circle at 82% 74%, rgba(255, 200, 87, 0.14), transparent 32%),
          linear-gradient(135deg, #07090c, #101621 58%, #08090d);
        color: var(--text);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: clamp(28px, 6vw, 72px) 0;
      }

      nav {
        margin-bottom: 30px;
      }

      .back {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        padding: 9px 13px;
        border: 1px solid rgba(66, 245, 212, 0.34);
        border-radius: 8px;
        background: rgba(66, 245, 212, 0.09);
        color: var(--cyan);
        text-decoration: none;
        font-weight: 800;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--cyan);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 8vw, 76px);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .intro {
        max-width: 68ch;
        margin: 18px 0 28px;
        color: var(--muted);
        line-height: 1.75;
        font-size: 17px;
      }

      .panel,
      .message {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.24);
      }

      .panel {
        padding: 20px;
        margin-bottom: 18px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid rgba(66, 245, 212, 0.24);
        border-radius: 8px;
        background: rgba(5, 10, 17, 0.86);
        color: var(--text);
        outline: none;
      }

      input {
        min-height: 44px;
        padding: 10px 12px;
      }

      textarea {
        min-height: 132px;
        resize: vertical;
        padding: 12px;
        line-height: 1.6;
      }

      input:focus,
      textarea:focus {
        border-color: rgba(255, 200, 87, 0.72);
      }

      .form-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .submit {
        min-height: 44px;
        padding: 9px 16px;
        border: 1px solid rgba(255, 200, 87, 0.72);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(255, 200, 87, 0.28), rgba(66, 245, 212, 0.13));
        color: var(--text);
        font-weight: 900;
        cursor: pointer;
      }

      .submit:disabled {
        cursor: not-allowed;
        filter: grayscale(0.75) brightness(0.72);
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
      }

      .error {
        color: var(--red);
      }

      .messages {
        display: grid;
        gap: 12px;
      }

      .message {
        padding: 16px;
      }

      .message header {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }

      .name {
        color: var(--gold);
        font-weight: 900;
      }

      .time {
        color: var(--muted);
        font-size: 13px;
      }

      .body {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        line-height: 1.68;
      }
    </style>
  </head>
  <body>
    <main>
      <nav><a class="back" href="forum.html">返回区域选择 / Back to Region Selection</a></nav>
      <p class="eyebrow">International Community</p>
      <h1>国际留言板（包含港澳台）</h1>
      <p class="intro">This community board uses the unified Cloudflare Worker API first. Firebase remains available as fallback.</p>

      <section class="panel" aria-label="发布留言">
        <form id="messageForm">
          <label>
            昵称 / Name
            <input id="nickname" name="nickname" maxlength="24" autocomplete="name" placeholder="Max 24 characters" required />
          </label>
          <label>
            留言 / Message
            <textarea id="message" name="message" maxlength="300" placeholder="Max 300 characters" required></textarea>
          </label>
          <div class="form-row">
            <button class="submit" id="submitButton" type="submit">发布留言</button>
            <span class="hint" id="statusText">正在连接留言板...</span>
          </div>
        </form>
      </section>

      <section class="messages" id="messages" aria-live="polite" aria-label="留言列表"></section>
    </main>

    
    <script type="module">
      import { ZiZiData } from "./assets/data/zizi-data-service.js";

      const MAX_NAME = 24;
      const MAX_MESSAGE = 300;
      const SERVER_ERROR = "\u8bc4\u8bba\u670d\u52a1\u5668\u6682\u65f6\u4e0d\u53ef\u7528\uff0c\u8bf7\u7a0d\u540e\u518d\u8bd5 / Comment server is temporarily unavailable.";
      const form = document.getElementById("messageForm");
      const formPanel = document.getElementById("formPanel");
      const fallbackPanel = document.getElementById("fallbackPanel");
      const nicknameInput = document.getElementById("nickname");
      const messageInput = document.getElementById("message");
      const submitButton = document.getElementById("submitButton");
      const statusText = document.getElementById("statusText");
      const messagesEl = document.getElementById("messages");

      if (formPanel) formPanel.hidden = false;
      if (fallbackPanel) fallbackPanel.hidden = true;
      if (messagesEl) messagesEl.hidden = false;
      if (nicknameInput) nicknameInput.maxLength = MAX_NAME;
      if (messageInput) messageInput.maxLength = MAX_MESSAGE;

      function setStatus(text, error = false) {
        statusText.textContent = text;
        statusText.classList.toggle("error", error);
      }

      function clean(value, max) {
        return String(value || "").replace(/\s+/g, " ").trim().slice(0, max);
      }

      function cleanMessage(value) {
        return String(value || "").replace(/\r\n/g, "\n").replace(/\n{4,}/g, "\n\n\n").trim().slice(0, MAX_MESSAGE);
      }

      function formatTime(value) {
        if (!value) return "Just now";
        const date = typeof value.toDate === "function" ? value.toDate() : new Date(value);
        if (Number.isNaN(date.getTime())) return "Just now";
        return date.toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function renderMessage(data) {
        const article = document.createElement("article");
        article.className = "message";
        const header = document.createElement("header");
        const name = document.createElement("span");
        name.className = "name";
        name.textContent = data.nickname || data.playerName || "Anonymous";
        const time = document.createElement("time");
        time.className = "time";
        time.textContent = formatTime(data.createdAt);
        const body = document.createElement("p");
        body.className = "body";
        body.textContent = data.message || "";
        header.append(name, time);
        article.append(header, body);
        return article;
      }

      function renderMessages(items) {
        messagesEl.replaceChildren();
        if (!items.length) {
          const empty = document.createElement("p");
          empty.className = "hint";
          empty.textContent = "No comments yet.";
          messagesEl.append(empty);
          return;
        }
        items.forEach((item) => messagesEl.append(renderMessage(item)));
      }

      async function loadMessages() {
        setStatus("Loading comments...");
        try {
          const result = await ZiZiData.getComments({ limit: 50 });
          if (!result.ok) throw new Error(result.error || "Comment server unavailable");
          renderMessages(result.items || []);
          setStatus("Comments connected.");
        } catch (error) {
          console.error("[ZIzi Forum] Comment load failed:", error);
          renderMessages([]);
          setStatus(SERVER_ERROR, true);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const playerName = clean(nicknameInput.value, MAX_NAME);
        const message = cleanMessage(messageInput.value);
        if (!playerName) {
          setStatus("Please enter a name.", true);
          return;
        }
        if (!message) {
          setStatus("Please enter a message.", true);
          return;
        }
        submitButton.disabled = true;
        setStatus("Publishing...");
        try {
          const result = await ZiZiData.addComment({ playerName, message, region: "global" });
          if (!result.ok) throw new Error(result.error || "Comment submission failed");
          messageInput.value = "";
          await loadMessages();
          setStatus("Comment published.");
        } catch (error) {
          console.error("[ZIzi Forum] Comment submission failed:", error);
          setStatus(SERVER_ERROR, true);
        } finally {
          submitButton.disabled = false;
        }
      });

      loadMessages();
    </script>
  </body>
</html>

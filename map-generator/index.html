<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wargame Map Generator</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #171a1f;
        --muted: #5d6470;
        --line: rgba(36, 43, 52, 0.18);
        --paper: #f5f1e8;
        --panel: rgba(255, 255, 255, 0.9);
        --field: #dce7c9;
        --forest: #2f9275;
        --water: #247d9c;
        --rail: #43464d;
        --danger: #9f2228;
        --gold: #c99d34;
        --shadow: 0 18px 45px rgba(24, 31, 38, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(120deg, rgba(36, 102, 95, 0.1), transparent 34%),
          linear-gradient(300deg, rgba(159, 34, 40, 0.08), transparent 42%),
          var(--paper);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button,
      label,
      input[type="file"] {
        -webkit-tap-highlight-color: transparent;
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        min-height: 64px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 18px;
        padding: 12px clamp(14px, 2vw, 26px);
        border-bottom: 1px solid var(--line);
        background: rgba(245, 241, 232, 0.92);
        backdrop-filter: blur(14px);
      }

      .brand {
        display: grid;
        gap: 2px;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(20px, 2.2vw, 30px);
        letter-spacing: 0;
      }

      .brand span {
        color: var(--muted);
        font-size: 13px;
      }

      .back-link,
      .toolbar button,
      .palette button,
      .field-control button,
      .field-grid button,
      .file-button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--ink);
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(24, 31, 38, 0.06);
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        text-decoration: none;
        font-weight: 700;
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .toolbar button,
      .field-grid button,
      .file-button {
        padding: 0 12px;
        font-weight: 700;
      }

      .toolbar button.primary {
        border-color: rgba(159, 34, 40, 0.26);
        background: var(--danger);
        color: white;
      }

      .toolbar button:disabled {
        opacity: 0.48;
        cursor: not-allowed;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(270px, 330px) 1fr;
        min-height: calc(100vh - 64px);
      }

      .side-panel {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 18px;
        padding: 18px;
        border-right: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.56);
      }

      .panel-block {
        display: grid;
        gap: 10px;
      }

      .panel-title {
        margin: 0;
        color: #303640;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .palette {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .palette button {
        min-height: 92px;
        display: grid;
        grid-template-columns: 48px 1fr;
        align-items: center;
        gap: 10px;
        padding: 8px;
        text-align: left;
      }

      .palette button[aria-pressed="true"] {
        border-color: rgba(159, 34, 40, 0.42);
        outline: 3px solid rgba(159, 34, 40, 0.14);
        background: rgba(255, 255, 255, 0.98);
      }

      .tile-swatch {
        width: 48px;
        height: 42px;
        clip-path: polygon(25% 0, 75% 0, 100% 50%, 75% 100%, 25% 100%, 0 50%);
        border: 1px solid rgba(22, 26, 31, 0.34);
        background: var(--field);
      }

      .tile-copy {
        min-width: 0;
        display: grid;
        gap: 2px;
      }

      .tile-copy strong {
        font-size: 13px;
        line-height: 1.15;
      }

      .tile-copy span {
        color: var(--muted);
        font-size: 11px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .field-control {
        display: grid;
        gap: 6px;
      }

      .field-control label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .field-control input,
      .json-box {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--ink);
      }

      .field-control input {
        min-height: 38px;
        padding: 0 10px;
      }

      .status-card {
        display: grid;
        gap: 10px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(120deg, rgba(36, 102, 95, 0.1), transparent),
          rgba(255, 255, 255, 0.72);
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        color: var(--muted);
        font-size: 12px;
      }

      .status-row b {
        color: var(--ink);
      }

      .json-box {
        min-height: 130px;
        resize: vertical;
        padding: 10px;
        font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
      }

      .canvas-wrap {
        position: relative;
        min-width: 0;
        overflow: auto;
        padding: clamp(16px, 2.4vw, 28px);
      }

      .map-stage {
        width: max-content;
        min-width: 100%;
        display: grid;
        gap: 12px;
      }

      .canvas-frame {
        width: max-content;
        padding: 18px;
        border: 1px solid rgba(32, 39, 47, 0.24);
        border-radius: 8px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.28) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.28) 1px, transparent 1px),
          #cfc7bd;
        background-size: 24px 24px;
        box-shadow: var(--shadow);
      }

      canvas {
        display: block;
        touch-action: none;
      }

      #mapCanvas {
        border: 1px solid rgba(30, 34, 40, 0.34);
        border-radius: 6px;
        background: #d7d0c6;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.66);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--field);
      }

      .dot.forest { background: var(--forest); }
      .dot.water { background: var(--water); }
      .dot.rail { background: var(--rail); }
      .dot.city { background: #7c7f7e; }
      .dot.setup { background: var(--danger); }

      .hidden-input {
        display: none;
      }

      @media (max-width: 900px) {
        .topbar {
          position: static;
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: flex-start;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .side-panel {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .palette {
          grid-template-columns: repeat(4, minmax(130px, 1fr));
          overflow-x: auto;
        }
      }

      @media (max-width: 560px) {
        .palette {
          grid-template-columns: 1fr 1fr;
        }

        .toolbar button,
        .file-button {
          flex: 1 1 auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="back-link" href="../">← ZIzi Game Index</a>
        <div class="brand">
          <h1>兵棋地图生成器 / Wargame Map Generator</h1>
          <span>Operation Typhoon terrain sheet prototype</span>
        </div>
        <div class="toolbar" aria-label="Map actions">
          <button type="button" id="undoBtn" title="Undo">↶ Undo</button>
          <button type="button" id="redoBtn" title="Redo">↷ Redo</button>
          <button type="button" id="sampleBtn">Sample</button>
          <button type="button" id="clearBtn">Clear</button>
          <button type="button" id="pngBtn" class="primary">PNG</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="side-panel">
          <section class="panel-block" aria-label="Terrain palette">
            <h2 class="panel-title">Terrain</h2>
            <div class="palette" id="palette"></div>
          </section>

          <section class="panel-block" aria-label="Map size">
            <h2 class="panel-title">Map Size</h2>
            <div class="field-grid">
              <div class="field-control">
                <label for="colsInput">Columns</label>
                <input id="colsInput" type="number" min="4" max="24" value="14" />
              </div>
              <div class="field-control">
                <label for="rowsInput">Rows</label>
                <input id="rowsInput" type="number" min="4" max="18" value="10" />
              </div>
            </div>
            <div class="field-grid">
              <button type="button" id="resizeBtn">Resize</button>
              <button type="button" id="fillBtn">Fill Selected</button>
            </div>
          </section>

          <section class="status-card" aria-label="Selection">
            <div class="status-row"><span>Selected</span><b id="selectedLabel">Open</b></div>
            <div class="status-row"><span>Pointer</span><b id="hoverLabel">--</b></div>
            <div class="status-row"><span>Grid</span><b id="gridLabel">14 × 10</b></div>
          </section>

          <section class="panel-block" aria-label="Map JSON">
            <h2 class="panel-title">Map JSON</h2>
            <textarea id="jsonBox" class="json-box" spellcheck="false"></textarea>
            <div class="field-grid">
              <button type="button" id="copyBtn">Copy</button>
              <button type="button" id="downloadJsonBtn">Download</button>
              <label class="file-button" for="importFile">Import</label>
              <button type="button" id="applyJsonBtn">Apply JSON</button>
            </div>
            <input class="hidden-input" id="importFile" type="file" accept="application/json,.json" />
          </section>
        </aside>

        <section class="canvas-wrap" aria-label="Hex map editor">
          <div class="map-stage">
            <div class="canvas-frame">
              <canvas id="mapCanvas" width="1120" height="820"></canvas>
            </div>
            <div class="legend" aria-label="Terrain legend">
              <span><i class="dot"></i>Open</span>
              <span><i class="dot forest"></i>Forest</span>
              <span><i class="dot city"></i>City</span>
              <span><i class="dot water"></i>River</span>
              <span><i class="dot rail"></i>Railroad</span>
              <span><i class="dot setup"></i>Setup</span>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const terrainImage = new Image();
      terrainImage.src = "../battle-for-moscow/assets/terrain.png";

      const canvas = document.getElementById("mapCanvas");
      const ctx = canvas.getContext("2d");
      const palette = document.getElementById("palette");
      const selectedLabel = document.getElementById("selectedLabel");
      const hoverLabel = document.getElementById("hoverLabel");
      const gridLabel = document.getElementById("gridLabel");
      const jsonBox = document.getElementById("jsonBox");
      const colsInput = document.getElementById("colsInput");
      const rowsInput = document.getElementById("rowsInput");
      const undoBtn = document.getElementById("undoBtn");
      const redoBtn = document.getElementById("redoBtn");

      const tileTypes = [
        {
          id: "open",
          name: "Open",
          zh: "开阔地",
          color: "#dce7c9",
          crop: { x: 28, y: 108, w: 102, h: 103 },
        },
        {
          id: "forest",
          name: "Forest",
          zh: "森林",
          color: "#72b997",
          crop: { x: 28, y: 226, w: 102, h: 97 },
        },
        {
          id: "city",
          name: "City",
          zh: "城市",
          color: "#cfd3c8",
          crop: { x: 26, y: 340, w: 106, h: 101 },
        },
        {
          id: "major-city",
          name: "Major City",
          zh: "大城市",
          color: "#c4c8c1",
          crop: { x: 25, y: 452, w: 108, h: 99 },
        },
        {
          id: "fort",
          name: "Fortification",
          zh: "筑垒",
          color: "#b9bbbb",
          crop: { x: 27, y: 563, w: 105, h: 96 },
        },
        {
          id: "river",
          name: "River",
          zh: "河流",
          color: "#c7ddca",
          crop: { x: 27, y: 665, w: 106, h: 105 },
        },
        {
          id: "rail",
          name: "Railroad",
          zh: "铁路",
          color: "#cedcc5",
          crop: { x: 27, y: 780, w: 106, h: 100 },
        },
        {
          id: "setup",
          name: "Star / Cross",
          zh: "部署标记",
          color: "#cfdcc3",
          crop: { x: 27, y: 891, w: 106, h: 100 },
        },
      ];

      const tileById = Object.fromEntries(tileTypes.map((tile) => [tile.id, tile]));

      const state = {
        cols: 14,
        rows: 10,
        size: 42,
        selected: "open",
        hover: null,
        painting: false,
        board: [],
        undo: [],
        redo: [],
      };

      function makeBoard(cols, rows, fill = "open") {
        return Array.from({ length: rows }, () => Array.from({ length: cols }, () => fill));
      }

      function cloneBoard(board = state.board) {
        return board.map((row) => row.slice());
      }

      function pushHistory() {
        state.undo.push(cloneBoard());
        if (state.undo.length > 80) {
          state.undo.shift();
        }
        state.redo = [];
        updateHistoryButtons();
      }

      function updateHistoryButtons() {
        undoBtn.disabled = state.undo.length === 0;
        redoBtn.disabled = state.redo.length === 0;
      }

      function setSelected(id) {
        state.selected = id;
        selectedLabel.textContent = tileById[id].name;
        [...palette.querySelectorAll("button")].forEach((button) => {
          button.setAttribute("aria-pressed", button.dataset.tile === id ? "true" : "false");
        });
      }

      function buildPalette() {
        palette.innerHTML = "";
        tileTypes.forEach((tile) => {
          const button = document.createElement("button");
          button.type = "button";
          button.dataset.tile = tile.id;
          button.setAttribute("aria-pressed", tile.id === state.selected ? "true" : "false");
          button.innerHTML = `
            <span class="tile-swatch" style="background:${tile.color}"></span>
            <span class="tile-copy">
              <strong>${tile.name}</strong>
              <span>${tile.zh}</span>
            </span>
          `;
          button.addEventListener("click", () => setSelected(tile.id));
          palette.appendChild(button);
        });
      }

      function resizeCanvas() {
        const s = state.size;
        const hexHeight = Math.sqrt(3) * s;
        const width = Math.ceil((state.cols - 1) * 1.5 * s + 2 * s + 44);
        const height = Math.ceil((state.rows + 0.5) * hexHeight + 44);
        canvas.width = width;
        canvas.height = height;
        gridLabel.textContent = `${state.cols} × ${state.rows}`;
      }

      function hexCenter(q, r) {
        const s = state.size;
        const hexHeight = Math.sqrt(3) * s;
        return {
          x: 24 + s + q * 1.5 * s,
          y: 24 + hexHeight / 2 + r * hexHeight + (q % 2) * (hexHeight / 2),
        };
      }

      function hexPath(cx, cy, s = state.size) {
        ctx.beginPath();
        for (let i = 0; i < 6; i += 1) {
          const angle = (Math.PI / 180) * (60 * i);
          const x = cx + s * Math.cos(angle);
          const y = cy + s * Math.sin(angle);
          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }
        ctx.closePath();
      }

      function pointInHex(px, py, cx, cy) {
        const s = state.size;
        const dx = Math.abs(px - cx);
        const dy = Math.abs(py - cy);
        const h = Math.sqrt(3) * s / 2;
        if (dx > s || dy > h) return false;
        return s * h - h * dx - s * 0.5 * dy >= 0;
      }

      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function hexAtPoint(x, y) {
        let found = null;
        for (let q = 0; q < state.cols; q += 1) {
          for (let r = 0; r < state.rows; r += 1) {
            const center = hexCenter(q, r);
            if (pointInHex(x, y, center.x, center.y)) {
              found = { q, r };
              break;
            }
          }
          if (found) break;
        }
        return found;
      }

      function drawTexture(tile, cx, cy) {
        const s = state.size;
        const c = tile.crop;
        ctx.save();
        hexPath(cx, cy, s - 1);
        ctx.clip();
        ctx.fillStyle = tile.color;
        ctx.fillRect(cx - s, cy - s, s * 2, s * 2);
        if (terrainImage.complete && terrainImage.naturalWidth > 0) {
          ctx.drawImage(terrainImage, c.x, c.y, c.w, c.h, cx - s, cy - s * 0.9, s * 2, s * 1.8);
        }
        addTileMarks(tile.id, cx, cy);
        ctx.restore();
      }

      function addTileMarks(id, cx, cy) {
        ctx.save();
        ctx.translate(cx, cy);
        if (id === "river") {
          ctx.strokeStyle = "rgba(25, 114, 143, 0.86)";
          ctx.lineWidth = 8;
          ctx.beginPath();
          ctx.moveTo(-30, -24);
          ctx.bezierCurveTo(-10, -10, 10, 8, 32, 24);
          ctx.stroke();
          ctx.strokeStyle = "rgba(255,255,255,0.44)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        if (id === "rail") {
          ctx.strokeStyle = "rgba(45, 49, 55, 0.8)";
          ctx.lineWidth = 3;
          ctx.setLineDash([8, 5]);
          ctx.beginPath();
          ctx.moveTo(-34, 12);
          ctx.quadraticCurveTo(-5, -16, 34, -10);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.lineWidth = 1.4;
          for (let i = -26; i <= 26; i += 13) {
            ctx.beginPath();
            ctx.moveTo(i - 4, 5);
            ctx.lineTo(i + 4, -12);
            ctx.stroke();
          }
        }
        if (id === "city" || id === "major-city") {
          ctx.fillStyle = "rgba(62, 64, 63, 0.58)";
          const blocks = id === "major-city" ? 9 : 5;
          for (let i = 0; i < blocks; i += 1) {
            const x = -24 + (i % 3) * 16;
            const y = -14 + Math.floor(i / 3) * 13;
            ctx.fillRect(x, y, 10, 8);
          }
          if (id === "major-city") {
            ctx.strokeStyle = "rgba(199, 157, 52, 0.94)";
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(0, 0, 34, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
        if (id === "fort") {
          ctx.fillStyle = "rgba(65, 69, 73, 0.4)";
          for (let i = -28; i <= 28; i += 14) {
            ctx.fillRect(i, -20, 7, 40);
          }
        }
        if (id === "setup") {
          drawStar(-16, -7, 11, "#c8202f");
          ctx.strokeStyle = "#23272d";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(11, -16);
          ctx.lineTo(11, 10);
          ctx.moveTo(-2, -3);
          ctx.lineTo(24, -3);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawStar(x, y, radius, color) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = color;
        ctx.beginPath();
        for (let i = 0; i < 10; i += 1) {
          const r = i % 2 === 0 ? radius : radius * 0.42;
          const angle = -Math.PI / 2 + i * Math.PI / 5;
          const px = Math.cos(angle) * r;
          const py = Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawCoordinate(q, r, cx, cy) {
        ctx.fillStyle = "rgba(59, 65, 70, 0.42)";
        ctx.font = "11px Cascadia Mono, Consolas, monospace";
        ctx.textAlign = "center";
        ctx.fillText(`${String(q + 1).padStart(2, "0")}${String(r + 1).padStart(2, "0")}`, cx, cy - 25);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#d0c8be";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let r = 0; r < state.rows; r += 1) {
          for (let q = 0; q < state.cols; q += 1) {
            const tile = tileById[state.board[r][q]] || tileById.open;
            const center = hexCenter(q, r);
            drawTexture(tile, center.x, center.y);
            hexPath(center.x, center.y, state.size - 0.5);
            ctx.strokeStyle = "rgba(20, 24, 28, 0.68)";
            ctx.lineWidth = 1.2;
            ctx.stroke();
            drawCoordinate(q, r, center.x, center.y);
          }
        }
        if (state.hover) {
          const center = hexCenter(state.hover.q, state.hover.r);
          hexPath(center.x, center.y, state.size - 2);
          ctx.strokeStyle = "rgba(159, 34, 40, 0.92)";
          ctx.lineWidth = 4;
          ctx.stroke();
        }
      }

      function paintHex(hex) {
        if (!hex) return;
        if (state.board[hex.r][hex.q] === state.selected) return;
        state.board[hex.r][hex.q] = state.selected;
        updateJson();
        draw();
      }

      function updateHover(hex) {
        state.hover = hex;
        hoverLabel.textContent = hex ? `${hex.q + 1}, ${hex.r + 1}` : "--";
        draw();
      }

      function currentDocument() {
        return {
          version: 1,
          source: "ZIzi_Game map-generator",
          terrainSheet: "battle-for-moscow/assets/terrain.png",
          cols: state.cols,
          rows: state.rows,
          tiles: cloneBoard(),
        };
      }

      function updateJson() {
        jsonBox.value = JSON.stringify(currentDocument(), null, 2);
        gridLabel.textContent = `${state.cols} × ${state.rows}`;
      }

      function loadDocument(doc) {
        if (!doc || !Array.isArray(doc.tiles)) {
          throw new Error("Missing tiles array");
        }
        const rows = Math.min(18, Math.max(4, Number(doc.rows || doc.tiles.length)));
        const cols = Math.min(24, Math.max(4, Number(doc.cols || doc.tiles[0]?.length || 14)));
        state.rows = rows;
        state.cols = cols;
        state.board = makeBoard(cols, rows);
        for (let r = 0; r < rows; r += 1) {
          for (let q = 0; q < cols; q += 1) {
            const id = doc.tiles[r]?.[q];
            state.board[r][q] = tileById[id] ? id : "open";
          }
        }
        rowsInput.value = rows;
        colsInput.value = cols;
        resizeCanvas();
        updateJson();
        draw();
      }

      function resizeBoard(cols, rows) {
        const next = makeBoard(cols, rows);
        for (let r = 0; r < rows; r += 1) {
          for (let q = 0; q < cols; q += 1) {
            next[r][q] = state.board[r]?.[q] || "open";
          }
        }
        state.cols = cols;
        state.rows = rows;
        state.board = next;
        resizeCanvas();
        updateJson();
        draw();
      }

      function sampleMap() {
        const sample = makeBoard(state.cols, state.rows, "open");
        for (let r = 0; r < state.rows; r += 1) {
          for (let q = 0; q < state.cols; q += 1) {
            if ((q + r) % 6 === 0) sample[r][q] = "forest";
            if (q === 4 && r > 1 && r < state.rows - 2) sample[r][q] = "river";
            if ((q === 2 || q === 8) && r > 0 && r < state.rows - 1) sample[r][q] = "rail";
            if ((q === 6 && r === 3) || (q === 10 && r === 5)) sample[r][q] = "city";
            if (q === state.cols - 3 && r === 2) sample[r][q] = "major-city";
            if (q === 7 && r === 1) sample[r][q] = "fort";
            if ((q === 1 && r === 2) || (q === 3 && r === 6) || (q === 11 && r === 4)) sample[r][q] = "setup";
          }
        }
        state.board = sample;
        updateJson();
        draw();
      }

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        const point = canvasPoint(event);
        const hex = hexAtPoint(point.x, point.y);
        if (!hex) return;
        pushHistory();
        state.painting = true;
        canvas.setPointerCapture(event.pointerId);
        paintHex(hex);
      });

      canvas.addEventListener("pointermove", (event) => {
        const point = canvasPoint(event);
        const hex = hexAtPoint(point.x, point.y);
        if (state.painting) {
          paintHex(hex);
        } else if (!state.hover || state.hover.q !== hex?.q || state.hover.r !== hex?.r) {
          updateHover(hex);
        }
      });

      canvas.addEventListener("pointerup", (event) => {
        state.painting = false;
        if (canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
      });

      canvas.addEventListener("pointerleave", () => {
        state.painting = false;
        updateHover(null);
      });

      undoBtn.addEventListener("click", () => {
        if (!state.undo.length) return;
        state.redo.push(cloneBoard());
        state.board = state.undo.pop();
        updateHistoryButtons();
        updateJson();
        draw();
      });

      redoBtn.addEventListener("click", () => {
        if (!state.redo.length) return;
        state.undo.push(cloneBoard());
        state.board = state.redo.pop();
        updateHistoryButtons();
        updateJson();
        draw();
      });

      document.getElementById("resizeBtn").addEventListener("click", () => {
        const cols = Math.min(24, Math.max(4, Number(colsInput.value) || state.cols));
        const rows = Math.min(18, Math.max(4, Number(rowsInput.value) || state.rows));
        pushHistory();
        resizeBoard(cols, rows);
      });

      document.getElementById("fillBtn").addEventListener("click", () => {
        pushHistory();
        state.board = makeBoard(state.cols, state.rows, state.selected);
        updateJson();
        draw();
      });

      document.getElementById("sampleBtn").addEventListener("click", () => {
        pushHistory();
        sampleMap();
      });

      document.getElementById("clearBtn").addEventListener("click", () => {
        pushHistory();
        state.board = makeBoard(state.cols, state.rows, "open");
        updateJson();
        draw();
      });

      document.getElementById("pngBtn").addEventListener("click", () => {
        const link = document.createElement("a");
        link.download = "wargame-map.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });

      document.getElementById("copyBtn").addEventListener("click", async () => {
        await navigator.clipboard.writeText(jsonBox.value);
      });

      document.getElementById("downloadJsonBtn").addEventListener("click", () => {
        const blob = new Blob([jsonBox.value], { type: "application/json" });
        const link = document.createElement("a");
        link.download = "wargame-map.json";
        link.href = URL.createObjectURL(blob);
        link.click();
        URL.revokeObjectURL(link.href);
      });

      document.getElementById("applyJsonBtn").addEventListener("click", () => {
        try {
          pushHistory();
          loadDocument(JSON.parse(jsonBox.value));
        } catch (error) {
          alert(`JSON import failed: ${error.message}`);
        }
      });

      document.getElementById("importFile").addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        try {
          const text = await file.text();
          jsonBox.value = text;
          pushHistory();
          loadDocument(JSON.parse(text));
        } catch (error) {
          alert(`JSON import failed: ${error.message}`);
        } finally {
          event.target.value = "";
        }
      });

      terrainImage.addEventListener("load", draw);
      terrainImage.addEventListener("error", draw);

      buildPalette();
      state.board = makeBoard(state.cols, state.rows, "open");
      resizeCanvas();
      setSelected("open");
      sampleMap();
      updateHistoryButtons();
    </script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中国大陆留言板 / Mainland Community - ZIzi Game</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --panel: rgba(255, 255, 255, 0.075);
        --line: rgba(255, 255, 255, 0.16);
        --text: #f3f7fb;
        --muted: #a5b0bd;
        --cyan: #42f5d4;
        --gold: #ffc857;
        --red: #ff6574;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 16% 12%, rgba(255, 77, 94, 0.22), transparent 30%),
          radial-gradient(circle at 82% 74%, rgba(255, 200, 87, 0.14), transparent 32%),
          linear-gradient(135deg, #07090c, #101621 58%, #08090d);
        color: var(--text);
      }
      button, input, textarea { font: inherit; }
      main { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: clamp(28px, 6vw, 72px) 0; }
      nav { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
      .back {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        padding: 9px 13px;
        border: 1px solid rgba(66, 245, 212, 0.34);
        border-radius: 8px;
        background: rgba(66, 245, 212, 0.09);
        color: var(--cyan);
        text-decoration: none;
        font-weight: 800;
      }
      .eyebrow { margin: 0 0 12px; color: var(--gold); font-size: 12px; font-weight: 900; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(42px, 8vw, 76px); line-height: 0.96; letter-spacing: 0; }
      .intro { max-width: 68ch; margin: 18px 0 28px; color: var(--muted); line-height: 1.75; font-size: 17px; }
      .panel, .message {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.24);
      }
      .panel { padding: 20px; margin-bottom: 18px; }
      .fallback {
        border-color: rgba(255, 200, 87, 0.34);
        background: linear-gradient(180deg, rgba(255, 200, 87, 0.12), rgba(255, 255, 255, 0.055));
      }
      .fallback p { margin: 0 0 12px; color: #f0e8d4; line-height: 1.7; }
      .fallback p:last-child { margin-bottom: 0; }
      .fallback a { color: var(--gold); font-weight: 900; }
      form { display: grid; gap: 12px; }
      form[hidden], .messages[hidden], .fallback[hidden], .panel[hidden] { display: none; }
      label { display: grid; gap: 7px; color: var(--muted); font-size: 13px; font-weight: 800; }
      input, textarea {
        width: 100%;
        border: 1px solid rgba(66, 245, 212, 0.24);
        border-radius: 8px;
        background: rgba(5, 10, 17, 0.86);
        color: var(--text);
        outline: none;
      }
      input { min-height: 44px; padding: 10px 12px; }
      textarea { min-height: 132px; resize: vertical; padding: 12px; line-height: 1.6; }
      input:focus, textarea:focus { border-color: rgba(255, 200, 87, 0.72); }
      .form-row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
      .submit {
        min-height: 44px;
        padding: 9px 16px;
        border: 1px solid rgba(255, 200, 87, 0.72);
        border-radius: 8px;
        background: linear-gradient(180deg, rgba(255, 200, 87, 0.28), rgba(66, 245, 212, 0.13));
        color: var(--text);
        font-weight: 900;
        cursor: pointer;
      }
      .submit:disabled { cursor: not-allowed; filter: grayscale(0.75) brightness(0.72); }
      .hint { color: var(--muted); font-size: 13px; }
      .error { color: var(--red); }
      .messages { display: grid; gap: 12px; }
      .message { padding: 16px; }
      .message header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
      .name { color: var(--gold); font-weight: 900; }
      .time { color: var(--muted); font-size: 13px; }
      .body { margin: 0; white-space: pre-wrap; overflow-wrap: anywhere; line-height: 1.68; }
    </style>
  </head>
  <body>
    <main>
      <nav>
        <a class="back" href="forum.html">返回区域选择 / Back</a>
        <a class="back" href="./">返回首页 / Home</a>
      </nav>
      <p class="eyebrow">Mainland China Community</p>
      <h1>中国大陆留言板</h1>
      <p class="intro">这个入口为中国大陆访问环境准备，不使用 Firebase 或 Google 服务。配置完成后将使用 Tencent CloudBase 数据库。</p>

      <section class="panel fallback" id="fallbackPanel">
        <p>中国大陆留言板正在建设中。由于 Firebase 在中国大陆访问不稳定，这里将使用更适合中国大陆访问的留言方案。</p>
        <p>如果你想留言，可以先发送到邮箱：<a href="mailto:3191261513@qq.com">3191261513@qq.com</a></p>
      </section>

      <section class="panel" id="formPanel" aria-label="发布留言" hidden>
        <form id="messageForm">
          <label>
            昵称 / Name
            <input id="nickname" name="nickname" maxlength="20" autocomplete="name" placeholder="最多 20 个字符" required />
          </label>
          <label>
            留言 / Message
            <textarea id="message" name="message" maxlength="500" placeholder="最多 500 个字符" required></textarea>
          </label>
          <div class="form-row">
            <button class="submit" id="submitButton" type="submit">发布留言</button>
            <span class="hint" id="statusText">正在连接中国大陆留言板...</span>
          </div>
        </form>
      </section>
      <section class="messages" id="messages" aria-live="polite" aria-label="留言列表" hidden></section>
    </main>

    <script type="module">
      import { mainlandConfig } from "./assets/mainland-config.js";

      const MAX_NAME = 20;
      const MAX_MESSAGE = 500;
      const form = document.getElementById("messageForm");
      const formPanel = document.getElementById("formPanel");
      const nicknameInput = document.getElementById("nickname");
      const messageInput = document.getElementById("message");
      const submitButton = document.getElementById("submitButton");
      const statusText = document.getElementById("statusText");
      const messagesEl = document.getElementById("messages");
      const fallbackPanel = document.getElementById("fallbackPanel");

      function setStatus(text, error = false) {
        statusText.textContent = text;
        statusText.classList.toggle("error", error);
      }
      function clean(value, max) {
        return value.replace(/\s+/g, " ").trim().slice(0, max);
      }
      function cleanMessage(value) {
        return value.replace(/\r\n/g, "\n").replace(/\n{4,}/g, "\n\n\n").trim().slice(0, MAX_MESSAGE);
      }
      function formatTime(value) {
        if (!value) return "刚刚";
        const date = value instanceof Date ? value : new Date(value);
        if (Number.isNaN(date.getTime())) return "刚刚";
        return date.toLocaleString("zh-CN", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
      }
      function renderMessage(data) {
        const article = document.createElement("article");
        article.className = "message";
        const header = document.createElement("header");
        const name = document.createElement("span");
        name.className = "name";
        name.textContent = data.nickname || "匿名";
        const time = document.createElement("time");
        time.className = "time";
        time.textContent = formatTime(data.createdAt);
        const body = document.createElement("p");
        body.className = "body";
        body.textContent = data.message || "";
        header.append(name, time);
        article.append(header, body);
        return article;
      }
      function hasCloudBaseConfig(config) {
        return Boolean(config.enabled && config.cloudbase?.env && !config.cloudbase.env.startsWith("PASTE_") && config.cloudbase?.sdkUrl);
      }
      function loadScript(src) {
        return new Promise((resolve, reject) => {
          if (window.cloudbase) {
            resolve();
            return;
          }
          const script = document.createElement("script");
          script.src = src;
          script.async = true;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }
      async function connectCloudBase() {
        await loadScript(mainlandConfig.cloudbase.sdkUrl);
        const initOptions = {
          env: mainlandConfig.cloudbase.env,
          region: mainlandConfig.cloudbase.region || "ap-shanghai"
        };
        if (mainlandConfig.cloudbase.accessKey) initOptions.accessKey = mainlandConfig.cloudbase.accessKey;
        const app = window.cloudbase.init(initOptions);
        const auth = app.auth({ persistence: "local" });
        if (typeof auth.signInAnonymously === "function") {
          await auth.signInAnonymously();
        } else {
          await auth.anonymousAuthProvider().signIn();
        }
        return app.database();
      }
      function showFallback() {
        formPanel.hidden = true;
        messagesEl.hidden = true;
        fallbackPanel.hidden = false;
      }

      if (!hasCloudBaseConfig(mainlandConfig)) {
        showFallback();
      } else {
        fallbackPanel.hidden = true;
        formPanel.hidden = false;
        messagesEl.hidden = false;
        setStatus("正在连接中国大陆留言板...");
        try {
          const db = await connectCloudBase();
          const messagesRef = db.collection(mainlandConfig.cloudbase.collections.messages);
          const snapshot = await messagesRef.orderBy("createdAt", "desc").limit(50).get();
          const rows = snapshot.data || [];
          messagesEl.replaceChildren();
          if (!rows.length) {
            const empty = document.createElement("p");
            empty.className = "hint";
            empty.textContent = "还没有留言。";
            messagesEl.append(empty);
          } else {
            rows.forEach((row) => messagesEl.append(renderMessage(row)));
          }
          setStatus("中国大陆留言板已连接。");
          form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const nickname = clean(nicknameInput.value, MAX_NAME);
            const message = cleanMessage(messageInput.value);
            if (!nickname) {
              setStatus("请输入昵称。", true);
              return;
            }
            if (!message) {
              setStatus("请输入留言内容。", true);
              return;
            }
            submitButton.disabled = true;
            setStatus("正在发布...");
            try {
              await messagesRef.add({ nickname, message, createdAt: new Date().toISOString() });
              messageInput.value = "";
              setStatus("发布成功，刷新页面后可查看。");
            } catch (_) {
              setStatus("发布失败，请检查 CloudBase 安全域名、匿名登录和数据库权限。", true);
            } finally {
              submitButton.disabled = false;
            }
          });
        } catch (_) {
          showFallback();
        }
      }
    </script>
  </body>
</html>

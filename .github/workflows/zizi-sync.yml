name: ZIzi Issue Sync

on:
  schedule:
    - cron: "47 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Sync issue submissions
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/zizi-sync-issues.mjs

      - name: Commit exported cache
        run: |
          if ! git diff --quiet -- data/comments.json data/leaderboards.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/comments.json data/leaderboards.json
            git commit -m "Update ZIzi sync cache"
            git push
          fi

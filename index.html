<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZIzi Game</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        --bg: #07090c;
        --panel: rgba(255, 255, 255, 0.07);
        --line: rgba(255, 255, 255, 0.16);
        --text: #f3f7fb;
        --muted: #a5b0bd;
        --cyan: #42f5d4;
        --gold: #ffc857;
        --rose: #ff5d73;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 18% 12%, rgba(66, 245, 212, 0.18), transparent 30%),
          radial-gradient(circle at 82% 74%, rgba(255, 200, 87, 0.14), transparent 32%),
          linear-gradient(135deg, #07090c, #101621 58%, #08090d);
        color: var(--text);
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: clamp(28px, 6vw, 72px) 0;
      }

      header {
        display: grid;
        gap: 14px;
        margin-bottom: clamp(28px, 5vw, 52px);
      }

      .eyebrow {
        margin: 0;
        color: var(--cyan);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(42px, 8vw, 92px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .intro {
        max-width: 62ch;
        margin: 0;
        color: var(--muted);
        font-size: clamp(16px, 2vw, 19px);
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .game {
        min-height: 260px;
        display: grid;
        align-content: end;
        gap: 14px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(rgba(7, 9, 12, 0.18), rgba(7, 9, 12, 0.86)),
          var(--accent);
        color: inherit;
        text-decoration: none;
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.28);
      }

      .game:hover {
        transform: translateY(-3px);
        border-color: rgba(66, 245, 212, 0.52);
      }

      .game strong {
        font-size: 24px;
        line-height: 1.1;
      }

      .game span {
        color: #d2dbe3;
        line-height: 1.55;
      }

      .game b {
        width: max-content;
        padding: 8px 11px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.1);
        color: var(--gold);
        font-size: 13px;
      }

      @media (max-width: 820px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .game {
          min-height: 210px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">ZIzi Game Collection</p>
        <h1>选择一个游戏开始</h1>
        <p class="intro">我是ZIzi，这里会持续收纳我的网页游戏。</p>
      </header>

      <section class="grid" aria-label="游戏列表">
        <a class="game" href="aetherfall-protocol/" style="--accent: linear-gradient(135deg, #102c2f, #2c1f45)">
          <strong>Aetherfall Protocol</strong>
          <span>（正在开发）光轨核心防线，程序化波次与升级选择。</span>
          <b>开始游戏</b>
        </a>

        <a class="game" href="starline-defense/" style="--accent: linear-gradient(135deg, #101b35, #33244b)">
          <strong>Starline Defense</strong>
          <span>（正在开发）星际防御作战，守住前线阵地。</span>
          <b>开始游戏</b>
        </a>

        <a class="game" href="pacman-odyssey/" style="--accent: linear-gradient(135deg, #2a2035, #423314)">
          <strong>Pacman Odyssey</strong>
          <span>（正在开发）网页版吃豆人冒险，迷宫、音乐和关卡挑战。</span>
          <b>开始游戏</b>
        </a>
      </section>
    </main>
  </body>
</html>

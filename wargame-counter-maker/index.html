<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>兵牌制作器</title>
<style>
:root{color:#efe8d3;background:#181713;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh;background:radial-gradient(circle at top left,rgba(181,31,30,.28),transparent 34rem),radial-gradient(circle at bottom right,rgba(93,98,87,.34),transparent 38rem),#181713}button,input,select{font:inherit}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.52}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:48px 0}.hero{max-width:760px;margin-bottom:28px}.eyebrow{margin:0 0 10px;color:#f5ae05;font-size:.78rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase}h1,h2,p{margin-top:0}h1{margin-bottom:12px;font-size:clamp(2.3rem,6vw,4.7rem);line-height:.95;letter-spacing:-.06em}h2{margin-bottom:6px;font-size:1.05rem}.hero p,.panel p,.hint,.messages{color:#c8bea5}.hero p{max-width:62ch;font-size:1.05rem;line-height:1.75}.workspace{display:grid;grid-template-columns:minmax(300px,400px) minmax(360px,1fr);gap:22px;align-items:start}.panel{border:1px solid rgba(239,232,211,.12);border-radius:24px;background:rgba(31,30,25,.82);box-shadow:0 24px 80px rgba(0,0,0,.28);backdrop-filter:blur(16px)}.controls{display:grid;gap:18px;padding:24px}.panel-head{border-bottom:1px solid rgba(239,232,211,.1);padding-bottom:16px}.panel-head p{margin-bottom:0;font-size:.92rem}.field{display:grid;gap:8px}.field>span{color:#fff6dc;font-size:.95rem;font-weight:750}.unit-data{display:grid;grid-template-columns:1fr 1fr;gap:12px}input,select{width:100%;border:1px solid rgba(239,232,211,.18);border-radius:14px;background:rgba(255,255,255,.07);color:#fff8e6;outline:0;padding:13px 14px}select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,#f5ae05 50%),linear-gradient(135deg,#f5ae05 50%,transparent 50%);background-position:calc(100% - 18px) 50%,calc(100% - 12px) 50%;background-size:6px 6px;background-repeat:no-repeat}option{color:#181713}input:focus,select:focus{border-color:#f5ae05;box-shadow:0 0 0 4px rgba(245,174,5,.13);background:rgba(255,255,255,.1)}input[aria-invalid=true]{border-color:#ff716b}input[type=file]{padding:12px}.hint{margin:0;font-size:.86rem;line-height:1.55}.messages{min-height:24px;font-size:.9rem;line-height:1.5}.messages p{margin:0 0 6px}.error{color:#ff9f99}.success{color:#b9efc0}.actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.actions button,.ghost{border:0;border-radius:14px;font-weight:850}.actions button{padding:14px 16px;background:#f5ae05;color:#1d1604;box-shadow:0 10px 28px rgba(245,174,5,.22)}.actions button:nth-child(2){background:#efe8d3}.actions button:nth-child(3){background:#d9ebff;color:#102033}.ghost{width:fit-content;border:1px solid rgba(239,232,211,.2);background:transparent;color:#efe8d3;padding:10px 12px}.preview-panel{padding:24px}.preview-frame{display:grid;place-items:center;overflow:hidden;border-radius:20px;background:linear-gradient(45deg,rgba(255,255,255,.05) 25%,transparent 25%),linear-gradient(-45deg,rgba(255,255,255,.05) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,rgba(255,255,255,.05) 75%),linear-gradient(-45deg,transparent 75%,rgba(255,255,255,.05) 75%),#11100d;background-position:0 0,0 10px,10px -10px,-10px 0;background-size:20px 20px;padding:18px}.preview-frame svg{display:block;width:min(100%,720px);height:auto;border-radius:18px}.back{display:inline-flex;margin-bottom:18px;color:#f5ae05;text-decoration:none;font-weight:800}@media(max-width:880px){.shell{width:min(100% - 22px,720px);padding:28px 0}.workspace{grid-template-columns:1fr}}@media(max-width:520px){.controls,.preview-panel{padding:18px}.actions,.unit-data{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="shell">
<a class="back" href="../">← 返回 ZIzi Game Index</a>
<section class="hero"><p class="eyebrow">Wargame Counter Maker</p><h1>兵牌制作器</h1><p>选择阵营、番号、编制和兵种，实时生成苏联/德国风格兵棋算子。SVG 是源图，PNG 固定导出为 1024×1024。</p></section>
<section class="workspace">
<form class="panel controls" onsubmit="return false">
<div class="panel-head"><h2>参数</h2><p>所有内容都在浏览器本地处理。</p></div>
<label class="field"><span>阵营</span><select id="faction"><option value="soviet">苏联</option><option value="german">德国</option></select></label>
<label class="field"><span>番号</span><input id="designation" value="NNA" maxlength="10" placeholder="例如 NNA / XXAK / 12A" autocomplete="off"></label>
<label class="field"><span>编制</span><select id="echelon"><option value="army">集团军 · XXXX</option><option value="corps">军 · XXX</option><option value="division">师 · XX</option><option value="brigade">旅 · X</option><option value="regiment">团 · III</option><option value="battalion">营 · II</option></select></label>
<label class="field"><span>兵种</span><select id="unit"><option value="infantry">步兵单位</option><option value="mechanized">机械化单位</option><option value="tank">坦克单位</option><option value="headquarters">指挥部</option><option value="cavalry">骑兵</option><option value="ski">滑雪</option><option value="mountain">山地</option><option value="motorizedInfantry">摩托化步兵</option><option value="security">安保部队</option></select></label>
<div class="field"><span>单位数据 / Unit Data</span><div class="unit-data"><label class="field"><span>满编战斗力 / Full combat</span><input id="combatFull" type="number" min="0" step="1" value="12"></label><label class="field"><span>减员战斗力 / Reduced combat</span><input id="combatReduced" type="number" min="0" step="1" value="6"></label><label class="field"><span>移动力 / Movement</span><input id="movement" type="number" min="0" step="1" value="6"></label><label class="field"><span>级数 / Steps</span><input id="steps" type="number" min="1" step="1" value="2"></label><label class="field"><span>初始 X 坐标 / Start X</span><input id="unitX" type="number" min="0" step="1" value="0"></label><label class="field"><span>初始 Y 坐标 / Start Y</span><input id="unitY" type="number" min="0" step="1" value="0"></label></div><p class="hint">这些字段只影响单位 JSON，不改变 SVG/PNG 兵牌外观。</p></div>
<div class="field"><span>自定义中央符号</span><input id="symbolUpload" type="file" accept="image/svg+xml,image/png,.svg,.png"><p class="hint">可选。上传后只替换中央符号，不改变底牌、文字和边框。</p><button id="resetSymbol" class="ghost" type="button" hidden>恢复内置符号</button></div>
<div id="messages" class="messages" aria-live="polite"></div>
<div class="actions"><button id="downloadSvg" type="button">下载 SVG</button><button id="downloadPng" type="button">下载 PNG</button><button id="downloadUnitJson" type="button">导出单位数据 / Export Unit JSON</button></div>
</form>
<section class="panel preview-panel"><div class="panel-head"><h2>预览</h2><p>1024×1024 输出比例</p></div><div id="preview" class="preview-frame"></div></section>
</section>
</main>
<script src="../assets/wargame-unit.js"></script>
<script>
var size=1024,frame={x:150,y:330,w:724,h:470,s:14},inner={x:170,y:350,w:684,h:430,s:14};
var marks={army:"XXXX",corps:"XXX",division:"XX",brigade:"X",regiment:"III",battalion:"II"};
var themes={soviet:{n:"苏联",bg:"#B51F1E",bd:"#8D1112",bl:"#D62828",sf:"#F5AE05",sl:"#FFD13A",sd:"#DB8F00"},german:{n:"德国",bg:"#5D6257",bd:"#42483F",bl:"#747A6E",sf:"#39482F",sl:"#4F623F",sd:"#2C3926"}};
var customSymbol="";function el(id){return document.getElementById(id)}function clean(v){return v.replace(/[^a-z0-9]/gi,"").toUpperCase()}
function line(x1,y1,x2,y2,s){s=s||inner.s;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" fill="none" stroke="#000" stroke-width="'+s+'" stroke-linecap="round" stroke-linejoin="round"/>'}
function infantry(){return cross()}
function cross(){return line(inner.x,inner.y,inner.x+inner.w,inner.y+inner.h)+line(inner.x+inner.w,inner.y,inner.x,inner.y+inner.h)}
function oval(scale){scale=scale||1;return '<ellipse cx="'+(inner.x+inner.w/2)+'" cy="'+(inner.y+inner.h/2)+'" rx="'+(inner.w*.31*scale)+'" ry="'+(inner.h*.2*scale)+'" fill="none" stroke="#000" stroke-width="'+inner.s+'" stroke-linecap="round"/>'}
function ski(){return '<g fill="none" stroke="#000" stroke-width="'+(inner.s*.62)+'" stroke-linecap="square" stroke-linejoin="miter"><path d="M '+(inner.x+inner.w*.35)+' '+(inner.y+inner.h*.62)+' L '+(inner.x+inner.w*.43)+' '+(inner.y+inner.h*.62)+' L '+(inner.x+inner.w*.49)+' '+(inner.y+inner.h*.4)+'"/><path d="M '+(inner.x+inner.w*.52)+' '+(inner.y+inner.h*.62)+' L '+(inner.x+inner.w*.6)+' '+(inner.y+inner.h*.62)+' L '+(inner.x+inner.w*.66)+' '+(inner.y+inner.h*.4)+'"/></g>'}
function mountain(){return cross()+'<path d="M '+(inner.x+inner.w*.42)+' '+(inner.y+inner.h)+' L '+(inner.x+inner.w*.5)+' '+(inner.y+inner.h*.74)+' L '+(inner.x+inner.w*.58)+' '+(inner.y+inner.h)+' Z" fill="#000"/>'}
function headquarters(){var w=inner.w*.42,h=inner.h*.27,x=inner.x+inner.w*.5-w*.5,y=inner.y+inner.h*.5-h*.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="none" stroke="#000" stroke-width="'+(inner.s*.62)+'"/><rect x="'+x+'" y="'+y+'" width="'+(w*.5)+'" height="'+(h*.5)+'" fill="#000"/><rect x="'+(x+w*.5)+'" y="'+(y+h*.5)+'" width="'+(w*.5)+'" height="'+(h*.5)+'" fill="#000"/>'}
function motorized(){return cross()+'<circle cx="'+(inner.x+inner.w*.43)+'" cy="'+(inner.y+inner.h*.88)+'" r="'+(inner.s*.95)+'" fill="#000"/><circle cx="'+(inner.x+inner.w*.57)+'" cy="'+(inner.y+inner.h*.88)+'" r="'+(inner.s*.95)+'" fill="#000"/>'}
function security(){return '<text x="'+(inner.x+inner.w/2)+'" y="'+(inner.y+inner.h*.55)+'" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black,Impact,sans-serif" font-size="'+(inner.h*.46)+'" font-weight="900" fill="#000">MP</text>'}
function unit(kind){if(kind==="infantry")return infantry();if(kind==="mechanized")return cross()+oval(.78);if(kind==="tank")return oval();if(kind==="cavalry")return line(inner.x,inner.y+inner.h,inner.x+inner.w,inner.y);if(kind==="ski")return ski();if(kind==="mountain")return mountain();if(kind==="headquarters")return headquarters();if(kind==="motorizedInfantry")return motorized();return security()}
function svgMarkup(){var f=el("faction").value,t=themes[f],d=el("designation").value||"NNA",fs=d.length<=4?118:d.length<=6?104:d.length<=8?88:76,ls=d.length<=4?18:8,sym=customSymbol?'<image href="'+customSymbol+'" x="'+(frame.x+42)+'" y="'+(frame.y+42)+'" width="'+(frame.w-84)+'" height="'+(frame.h-84)+'" preserveAspectRatio="xMidYMid meet"/>':unit(el("unit").value);return '<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" role="img" aria-label="'+t.n+d+'兵牌"><defs><radialGradient id="bg" cx="50%" cy="42%" r="74%"><stop offset="0%" stop-color="'+t.bl+'"/><stop offset="62%" stop-color="'+t.bg+'"/><stop offset="100%" stop-color="'+t.bd+'"/></radialGradient><linearGradient id="symbg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="'+t.sl+'"/><stop offset="52%" stop-color="'+t.sf+'"/><stop offset="100%" stop-color="'+t.sd+'"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".18"/></filter></defs><rect x="5" y="5" width="1014" height="1014" rx="32" fill="url(#bg)" stroke="#000" stroke-width="10"/><text x="512" y="137" text-anchor="middle" dominant-baseline="middle" font-family="Impact,Arial Black,Arial Narrow,sans-serif" font-size="72" font-weight="900" letter-spacing="22" fill="#000">'+marks[el("echelon").value]+'</text><text x="512" y="262" text-anchor="middle" dominant-baseline="middle" font-family="Impact,Arial Black,Arial Narrow,sans-serif" font-size="'+fs+'" font-weight="900" letter-spacing="'+ls+'" fill="#000">'+d+'</text><g filter="url(#shadow)"><rect x="'+frame.x+'" y="'+frame.y+'" width="'+frame.w+'" height="'+frame.h+'" fill="url(#symbg)" stroke="#000" stroke-width="'+frame.s+'"/>'+sym+'</g></svg>'}
function render(){var d=clean(el("designation").value);el("designation").value=d;el("designation").setAttribute("aria-invalid",String(!d));el("downloadSvg").disabled=!d;el("downloadPng").disabled=!d;el("downloadUnitJson").disabled=!d;el("messages").innerHTML=d?"":"<p class='error'>番号不能为空，且只能包含字母和数字。</p>";el("preview").innerHTML=svgMarkup().replace(/^<\?xml.*?\?>/,"")}
function save(blob,name){var a=document.createElement("a"),u=URL.createObjectURL(blob);a.href=u;a.download=name;document.body.append(a);a.click();a.remove();URL.revokeObjectURL(u)}function fname(ext){return "counter-"+el("faction").value+"-"+(el("designation").value||"unit")+"."+ext}
function unitDoc(){if(!window.ZiziWargameUnit)throw new Error("单位契约模块未加载 / Unit contract module is not loaded");return window.ZiziWargameUnit.normalizeUnitDocument({source:"ZIzi_Game wargame-counter-maker",unit:{faction:el("faction").value,designation:el("designation").value,echelon:el("echelon").value,unitType:el("unit").value,combatFull:el("combatFull").value,combatReduced:el("combatReduced").value,movement:el("movement").value,steps:el("steps").value,strength:"full",position:{x:el("unitX").value,y:el("unitY").value}}})}
el("downloadSvg").onclick=function(){save(new Blob([svgMarkup()],{type:"image/svg+xml;charset=utf-8"}),fname("svg"))};
el("downloadPng").onclick=function(){var img=new Image(),u=URL.createObjectURL(new Blob([svgMarkup()],{type:"image/svg+xml;charset=utf-8"}));img.onload=function(){var c=document.createElement("canvas");c.width=c.height=size;c.getContext("2d").drawImage(img,0,0,size,size);URL.revokeObjectURL(u);c.toBlob(function(b){if(b)save(b,fname("png"))},"image/png")};img.onerror=function(){el("messages").innerHTML="<p class='error'>PNG 导出失败，请检查自定义符号是否包含外部资源。</p>";URL.revokeObjectURL(u)};img.src=u};
el("downloadUnitJson").onclick=function(){try{var doc=unitDoc(),json=JSON.stringify(doc,null,2);el("messages").innerHTML="<p class='success'>单位 JSON 已生成 / Unit JSON exported.</p>";save(new Blob([json],{type:"application/json;charset=utf-8"}),"unit-"+doc.unit.id+".json")}catch(error){el("messages").innerHTML="<p class='error'>"+error.message+"</p>"}};
el("symbolUpload").onchange=function(e){var file=e.target.files[0];if(!file)return;if(!/(\.svg|\.png)$/i.test(file.name)&&["image/svg+xml","image/png"].indexOf(file.type)<0){el("messages").innerHTML="<p class='error'>只支持 SVG 或 PNG。</p>";return}if(file.size>2*1024*1024){el("messages").innerHTML="<p class='error'>符号文件请控制在 2MB 以内。</p>";return}var r=new FileReader();r.onload=function(){customSymbol=String(r.result);el("resetSymbol").hidden=false;render()};r.readAsDataURL(file)};
el("resetSymbol").onclick=function(){customSymbol="";el("symbolUpload").value="";el("resetSymbol").hidden=true;render()};["faction","designation","echelon","unit","combatFull","combatReduced","movement","steps","unitX","unitY"].forEach(function(id){el(id).addEventListener("input",render)});render();
</script>
</body>
</html>
